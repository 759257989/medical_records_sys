# .github/workflows/evals.yml
name: evals
on:
  pull_request:                      # 每个 PR 触发
    branches: [main]

jobs:
  scorecard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend   # 所有 run 步骤默认在 backend/ 下执行
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run eval scorecard (gate)
        id: eval
        env:                          # 真实 key 从仓库 Secrets 注入；Langfuse 不配 → 自动 no-op
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # --check：跌破阈值 → 退出码=1 → 这一步失败 → 整个 job 失败 → PR 变红
        run: python -m evals.harness.run_evals --check --no-rag --limit 15

      - name: Post scorecard as PR comment
        if: always()                  # 关键：即使上一步失败也要贴评论(让人看到为什么挂)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'backend/evals/results/scorecard.md';
            if (!fs.existsSync(path)) return;          // 评分卡没生成就跳过
            const body = '<!-- eval-scorecard -->\n' + fs.readFileSync(path, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            // 找之前贴过的同一条评论(用隐藏标记识别)，有则更新、无则新建——避免刷屏
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const mine = comments.data.find(c => c.body.includes('<!-- eval-scorecard -->'));
            if (mine) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: mine.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }